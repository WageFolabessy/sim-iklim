name: Deploy to DigitalOcean Droplet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/sim-iklim
            
            # Pastikan git tidak menolak karena perbedaan ownership
            git config --global --add safe.directory /var/www/sim-iklim
            
            # Reset file lokal dan tarik kode terbaru dari GitHub
            git fetch origin main
            git reset --hard origin/main
            
            # Update dependencies
            composer install --no-dev --optimize-autoloader
            npm install
            npm run build
            
            # Update database & cache
            php artisan migrate --force
            php artisan optimize
            
            # Permission hanya untuk folder yang butuh write oleh web server
            chown -R www-data:www-data /var/www/sim-iklim/storage
            chown -R www-data:www-data /var/www/sim-iklim/bootstrap/cache
            
            # Restart services agar kode baru langsung aktif
            systemctl restart php8.4-fpm
            supervisorctl restart all
